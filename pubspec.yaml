name: quan_ly_gas_app
description: Ứng dụng quản lý gas cho lái xe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase & FCM
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.7.0

  # Encrypt
  encrypt: ^5.0.3
  # Local storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Notifications (local display + scheduled)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # HTML render for ThamGiaChitiet
  flutter_html: ^3.0.0-beta.2

  # Biometric auth
  local_auth: ^2.3.0

  # GPS, bản đồ, điều hướng
  geolocator: ^13.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

  # Image picker for photo upload
  image_picker: ^1.1.2

  # Cached network image
  cached_network_image: ^3.4.1

  # Image compression (resize to under 1MB before upload)
  flutter_image_compress: ^2.3.0

  # Signature pad for digital signature
  signature: ^5.5.0

  # Background polling (cho điện thoại không có GMS)
  workmanager: ^0.9.0+3

  # Offline database (SQLite)
  sqflite: ^2.3.3
  path: ^1.9.1

  # Network connectivity monitoring
  connectivity_plus: ^6.1.0

  # Device detection (emulator vs real device)
  device_info_plus: ^10.1.0

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
